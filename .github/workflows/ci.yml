name: CI

on:
  push:
    branches:
      - main

jobs:
  build-scout-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker build
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest .

      - name: Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest
          only-severities: critical,high
          exit-code: false

      - name: Docker push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest
